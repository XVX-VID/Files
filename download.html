  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:      #0f0f10;
      --surface: #181819;
      --surface2:#1f1f21;
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text:    #f0eff0;
      --muted:   #888789;
      --accent:  #4f8ef7;
      --green:   #3ecf78;
      --font:    'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono:    'DM Mono', 'SF Mono', monospace;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .page { position: relative; z-index: 1; }

    /* Banner atas full width */
    .top-banner {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      padding: 8px;
      overflow: hidden;
    }

    /* Konten utama + sidebar */
    .layout {
      display: flex;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      align-items: flex-start;
    }

    .main  { flex: 1; min-width: 0; }
    .aside { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }

    /* ── SLOT IKLAN ── */
    .ad-box {
      background: var(--surface);
      border: 1px dashed var(--border2);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      padding: 8px;
      position: relative;
    }
    .ad-box.h90  { min-height: 90px; }
    .ad-box.h250 { min-height: 250px; }
    .ad-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      position: absolute;
      top: 5px;
      right: 8px;
      opacity: 0.5;
      pointer-events: none;
    }
    /* Semua konten iklan yang diinject tidak boleh melebihi container */
    .ad-box * { max-width: 100% !important; }
    .ad-box iframe { max-width: 100% !important; width: 100% !important; height: auto !important; }

    /* ── KONTEN ── */
    .cat-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 5px;
      background: rgba(79,142,247,0.12);
      color: var(--accent);
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }
    .stat-val   { font-size: clamp(18px, 4vw, 22px); font-weight: 600; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .file-info {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .file-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      background: rgba(79,142,247,0.1);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .file-icon svg { width: 18px; height: 18px; color: var(--accent); }
    .file-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; word-break: break-all; }
    .file-meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }

    .cd-text {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 3px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 1s linear;
    }

    .btn-dl {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 10px;
    }
    .btn-dl:disabled {
      background: var(--surface2);
      color: var(--muted);
      cursor: not-allowed;
      border: 1px solid var(--border);
    }
    .btn-dl.ready { background: var(--accent); color: white; }
    .btn-dl.ready:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-dl.done  { background: rgba(62,207,120,0.15); color: var(--green); border: 1px solid rgba(62,207,120,0.25); cursor: default; }

    /* Mirror link */
    .btn-mirror {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--muted);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
      margin-bottom: 20px;
    }
    .btn-mirror:hover { border-color: var(--accent); color: var(--accent); }
    .mirror-label {
      font-family: var(--mono);
      font-size: 10px;

      text-align: center;
      letter-spacing: 0.06em;

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    footer {
      text-align: center;
      font-size: 12px;

      padding: 20px 0 10px;
      border-top: 1px solid var(--border);

    /* Not found */
    .notfound {

      padding: 80px 20px;
    }
    .notfound h2 { font-size: 20px; margin-bottom: 8px; }
    .notfound p  { font-size: 14px; color: var(--muted); }

    /* ── RESPONSIVE ── */
    @media (max-width: 800px) {

      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      padding: 8px;
      overflow: hidden;
    }
  </style>
</head>

<script>
  // ============================================================
  // SMART LINK — ganti dengan URL smart link kamu
  // ============================================================
  var SMARTLINK_URL = 'https://www.profitablecpmratenetwork.com/i3y5x08f?key=30b893724f0b2edb2325f9842ae185c0';

  // Simpan id ke sessionStorage supaya tidak hilang saat popunder reload
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (id) {
    sessionStorage.setItem('dl_id', id);
  } else {
    id = sessionStorage.getItem('dl_id');
  }

  var file = FILES.find(function(f) { return f.id === id; });

  if (!file) {
    document.querySelector('.top-banner').style.display = 'none';
    document.querySelector('.layout').style.display = 'none';
    document.querySelector('.bottom-banner').style.display = 'none';
    document.getElementById('notfound').style.display = 'block';
  } else {
    document.title = 'Download — ' + file.name;

    document.getElementById('badge').textContent    = file.category;
    document.getElementById('judul').textContent    = file.name;
    document.getElementById('deskripsi').textContent = file.description;
    document.getElementById('ukuran').textContent   = file.size;
    document.getElementById('total-dl').textContent = file.downloads;
    document.getElementById('filename').textContent = file.filename;
    document.getElementById('os').textContent       = file.os;
    document.getElementById('ukuran2').textContent  = file.size;
    document.getElementById('mirror-btn').href      = SMARTLINK_URL;

    var cdText = document.getElementById('cd-text');
    var s      = file.countdown;
    var total  = file.countdown;
    var btn    = document.getElementById('dl-btn');
    var prog   = document.getElementById('prog');

    cdText.innerHTML = 'Tombol aktif dalam <strong>' + s + '</strong> detik...';

    var t = setInterval(function() {
      s--;
      prog.style.width = Math.round(((total - s) / total) * 100) + '%';
      if (s > 0) {
        cdText.innerHTML = 'Tombol aktif dalam <strong>' + s + '</strong> detik...';
      } else {
        clearInterval(t);
        cdText.textContent = 'File siap didownload!';
        btn.disabled = false;
        btn.classList.add('ready');
      }
    }, 1000);

    btn.addEventListener('click', function() {
      if (!btn.disabled) {
        window.location.href = file.downloadUrl;
        btn.className = 'btn-dl done';
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg> Download dimulai...';
      }
    });
  }
</script>
