<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f10;
      --surface: #181819;
      --surface2: #1f1f21;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0eff0;
      --muted: #888789;
      --accent: #4f8ef7;
      --accent2: #7c6af7;
      --green: #3ecf78;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 1.25rem 4rem; }

    /* header */
    header {
      padding: 3rem 0 2.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }
    header h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; }
    header p { font-size: 15px; color: var(--muted); margin-top: 8px; }

    /* ad banner */
    .ad-slot {
      background: var(--surface);
      border: 1px dashed var(--border2);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      margin-bottom: 2rem;
      min-height: 80px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    }
    .ad-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.12em; }
    .ad-desc { font-size: 13px; color: var(--muted); }

    /* file cards */
    .files { display: flex; flex-direction: column; gap: 12px; }

    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.18s, background 0.18s, transform 0.18s;
      cursor: pointer;
    }
    .file-card:hover {
      border-color: var(--border2);
      background: var(--surface2);
      transform: translateY(-1px);
    }

    .file-left { display: flex; align-items: center; gap: 14px; }

    .file-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      background: rgba(79,142,247,0.1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .file-icon svg { width: 20px; height: 20px; color: var(--accent); }

    .file-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .file-desc { font-size: 13px; color: var(--muted); line-height: 1.5; max-width: 380px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .file-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

    .cat-badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      background: rgba(79,142,247,0.12);
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    .file-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; }

    .arrow {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .file-card:hover .arrow { background: var(--accent); border-color: var(--accent); }
    .arrow svg { width: 14px; height: 14px; color: var(--muted); }
    .file-card:hover .arrow svg { color: white; }

    footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">DOWNLOAD CENTER</div>
      <h1>Semua File<br>di Satu Tempat</h1>
      <p>Pilih file yang ingin kamu unduh di bawah ini.</p>
    </header>

    <!-- SLOT IKLAN ATAS -->
    <div class="ad-slot">
      <div class="ad-label">ADVERTISEMENT</div>
      <div class="ad-desc">Slot Google AdSense 728×90 — pasang kode di sini</div>
    </div>

    <div class="files" id="file-list">
      <!-- diisi otomatis dari data.js -->
    </div>

    <!-- SLOT IKLAN BAWAH -->
    <div class="ad-slot" style="margin-top: 2rem;">
      <div class="ad-label">ADVERTISEMENT</div>
      <div class="ad-desc">Slot Google AdSense 300×250</div>
    </div>

    <footer>NamaSite.com &nbsp;·&nbsp; Semua file aman & terverifikasi</footer>
  </div>

  <script src="data.js"></script>
  <script>
    const list = document.getElementById('file-list');

    FILES.forEach(f => {
      list.innerHTML += `
        <a class="file-card" href="download.html?id=${f.id}">
          <div class="file-left">
            <div class="file-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
              </svg>
            </div>
            <div>
              <div class="file-name">${f.name}</div>
              <div class="file-desc">${f.description}</div>
            </div>
          </div>
          <div class="file-right">
            <span class="cat-badge">${f.category}</span>
            <div class="file-meta"><span>${f.size}</span><span>${f.downloads} unduhan</span></div>
            <div class="arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
              </svg>
            </div>
          </div>
        </a>`;
    });
  </script>
</body>
</html>
